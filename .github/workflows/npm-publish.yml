name: Publish Grid Library

on:
  push:
    branches:
      - main
    paths:
      - "packages/dynamic-grid-lib/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Essential for OIDC

jobs:
  publish-grid:
    runs-on: ubuntu-latest
    env:
      PKG_DIR: "packages/dynamic-grid-lib"
      PKG_NAME: "ynotsoft-dynamic-grid"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          # No 'scope' or 'always-auth' needed for OIDC

      - name: Install dependencies
        run: npm install 

      - name: Build Library
        run: npm run build --workspace=${{ env.PKG_NAME }}

      - name: Determine Version and Tag
        id: info
        run: |
          VER=$(node -p "require('./${{ env.PKG_DIR }}/package.json').version")
          NAME=$(node -p "require('./${{ env.PKG_DIR }}/package.json').name")
          if [[ "$VER" == *-* ]]; then TAG="next"; else TAG="latest"; fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate Version Bump
        run: |
          PKG="${{ steps.info.outputs.name }}"
          VER="${{ steps.info.outputs.version }}"
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "::error::Version $VER of $PKG already exists on NPM."
            exit 1
          fi

      - name: Publish to npm
        # No NODE_AUTH_TOKEN env variable needed here for OIDC
        run: npm publish ./${{ env.PKG_DIR }} --access public --provenance --tag "${{ steps.info.outputs.tag }}"
